<div *ngIf="showSuccessAlert" style="margin: 10px auto; max-width: 900px; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 15px; border-radius: 6px; font-family: 'Segoe UI', sans-serif; font-weight: 600; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: all 0.3s ease-in-out;">
  <span style="display: inline-flex; align-items: center; gap: 8px;">
    ✅ {{ alertMessage }}
  </span>
  <button (click)="showSuccessAlert = false" style="background: none; border: none; color: #155724; font-size: 18px; cursor: pointer; font-weight: bold;">&times;</button>
</div>

<div style="margin: 20px auto; max-width: 900px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px;">
    <input type="text" [(ngModel)]="searchTerm" (input)="filterEmployees()" placeholder="Search by Name or Department..." style="padding: 10px; width: 60%; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; height: 42px;">
    <button routerLink="/add" style="background-color: #2980b9; color: white; border: none; padding: 0 20px; font-size: 14px; cursor: pointer; border-radius: 4px; font-weight: bold; height: 42px; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; white-space: nowrap;">+ Add New Employee</button>
  </div>

  <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
    <div style="font-size: 14px; color: #7f8c8d; font-weight: 500;">
      Showing <span style="background-color: #2980b9; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600;">{{ filteredEmployees.length }}</span> active employee record(s).
    </div>
    <button (click)="exportToCSV()" style="background-color: #27ae60; color: white; border: none; padding: 6px 12px; font-size: 13px; cursor: pointer; border-radius: 4px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px;">
      📥 Export CSV Report
    </button>
  </div>

  <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; border: 1px solid #ddd; background-color: #ffffff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-radius: 4px; overflow: hidden;">
    <thead>
      <tr style="background-color: #f8f9fa; border-bottom: 2px solid #ddd;">
        <th style="padding: 12px; border: 1px solid #ddd; font-weight: 600; color: #333;">ID</th>
        <th style="padding: 12px; border: 1px solid #ddd; font-weight: 600; color: #333;">Name</th>
        <th style="padding: 12px; border: 1px solid #ddd; font-weight: 600; color: #333;">Email</th>
        <th style="padding: 12px; border: 1px solid #ddd; font-weight: 600; color: #333;">Department</th>
        <th style="padding: 12px; border: 1px solid #ddd; font-weight: 600; color: #333;">Salary</th>
        <th style="padding: 12px; border: 1px solid #ddd; text-align: center; font-weight: 600; color: #333;">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let emp of filteredEmployees" style="border-bottom: 1px solid #ddd; transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='#fdfdfd'" onmouseout="this.style.backgroundColor='#ffffff'">
        <td style="padding: 12px; border: 1px solid #ddd; color: #555;">{{ emp.id }}</td>
        <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold; color: #2c3e50;">{{ emp.name }}</td>
        <td style="padding: 12px; border: 1px solid #ddd; color: #555;">{{ emp.email }}</td>
        <td style="padding: 12px; border: 1px solid #ddd; color: #555;"><span style="background-color: #ecf0f1; padding: 4px 8px; border-radius: 3px; font-size: 12px; font-weight: 500;">{{ emp.department }}</span></td>
        <td style="padding: 12px; border: 1px solid #ddd; font-weight: 600; color: #27ae60;">₹{{ emp.salary }}</td>
        <td style="padding: 12px; border: 1px solid #ddd; text-align: center; white-space: nowrap;">
          <button [routerLink]="['/edit', emp.id]" style="background-color: #f39c12; color: white; border: none; padding: 6px 14px; margin-right: 6px; cursor: pointer; border-radius: 4px; font-weight: 500; font-size: 13px;">Edit</button>
          <button (click)="onDelete(emp.id)" style="background-color: #c0392b; color: white; border: none; padding: 6px 14px; cursor: pointer; border-radius: 4px; font-weight: 500; font-size: 13px;">Delete</button>
        </td>
      </tr>
      <tr *ngIf="filteredEmployees.length === 0">
        <td colspan="6" style="padding: 30px; text-align: center; color: #7f8c8d; font-style: italic; background-color: #fafafa;">No records found.</td>
      </tr>
    </tbody>
  </table>
</div>
