<div style="max-width: 500px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 12px #aaa;">
  <h3>{{ isEditMode ? 'Update Employee Details' : 'Register New Employee' }}</h3>
  <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">
    
    <div style="margin-bottom: 15px;">
      <label style="display:block; margin-bottom:5px;">Full Name:</label>
      <input type="text" formControlName="name" style="width: 100%; padding: 8px; box-sizing: border-box;">
      <small *ngIf="employeeForm.get('name')?.invalid && employeeForm.get('name')?.touched" style="color: red;">Name is required.</small>
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display:block; margin-bottom:5px;">Email Address:</label>
      <input type="email" formControlName="email" style="width: 100%; padding: 8px; box-sizing: border-box;">
      <small *ngIf="employeeForm.get('email')?.invalid && employeeForm.get('email')?.touched" style="color: red;">Provide a valid email layout.</small>
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display:block; margin-bottom:5px;">Department:</label>
      <input type="text" formControlName="department" style="width: 100%; padding: 8px; box-sizing: border-box;">
      <small *ngIf="employeeForm.get('department')?.invalid && employeeForm.get('department')?.touched" style="color: red;">Department field cannot be empty.</small>
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display:block; margin-bottom:5px;">Salary (INR):</label>
      <input type="number" formControlName="salary" style="width: 100%; padding: 8px; box-sizing: border-box;">
      <small *ngIf="employeeForm.get('salary')?.invalid && employeeForm.get('salary')?.touched" style="color: red;">Salary must be a positive number.</small>
    </div>

    <button type="submit" [disabled]="employeeForm.invalid" style="background-color: #27ae60; color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px;">Save Record</button>
    <button type="button" routerLink="/" style="background-color: #7f8c8d; color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px; margin-left: 10px;">Cancel</button>
  </form>
</div>
